<cite>Shuai</cite><span class=quote-date>· 2026-03</span></figcaption></figure><figure class=quote><blockquote>思考全面、持续学习、用技术解决真问题。</blockquote><figcaption><span class=quote-dash>—</span>
<cite><a href=https://baoyu.io/translations/2026/01/12/next-two-years-software-engineering rel="noopener nofollow" target=_blank>软件工程的未来两年</a></cite><span class=quote-date>· 2026-03</span></figcaption></figure><figure class=quote><blockquote>犯错的人不会沉浸在错误里，而是继续战斗。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>管泽元 S12 总决赛 2-2</cite><span class=quote-date>· 2022-11</span></figcaption></figure><figure class=quote><blockquote>优秀工程师的生产力至少是普通工程师的 10 倍，这并不是因为优秀的工程师写代码的速度快了 10 倍，而是因为他们做出的决策（设计）可以节省 10 倍的工作量。</blockquote><figcaption><span class=quote-dash>—</span>
<cite><a href=https://knowledge.csc.gov.sg/ethos-issue-21/how-to-build-good-software/ rel="noopener nofollow" target=_blank>How to Build Good Software</a></cite></figcaption></figure><figure class=quote><blockquote>在颁奖礼上，@罗翔说刑法 的致辞感动了无数人："我不过用我的视频拨动了大家的心弦，大家被自己心中的正义感所感动，将不配有的荣光投射给我。"</blockquote><figcaption><span class=quote-dash>—</span>
<cite>BILIBILI</cite><span class=quote-date>· 2022-01</span></figcaption></figure><figure class=quote><blockquote>功夫要下在平常。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>Benco</cite><span class=quote-date>· 2021-04</span></figcaption></figure><figure class=quote><blockquote>平台的增长、正向反馈。从不可或缺，走向下一个不可或缺。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>Benco</cite><span class=quote-date>· 2020-11</span></figcaption></figure><figure class=quote><blockquote>重铸 LCK 的荣光，我辈义不容辞。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>ShowMaker</cite><span class=quote-date>· 2020-10</span></figcaption></figure><figure class=quote><blockquote>职业生涯时是场马拉松。一定可以。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>Jammy</cite></figcaption></figure><figure class=quote><blockquote>无论我们发现了什么，考虑到当时的已知情况、个人的技术水平和能力、可用的资源、以及手上的状况，我们理解并坚信：每个人对自己的工作都已全力以赴。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>迭代回顾会分享</cite></figcaption></figure><figure class=quote><blockquote>珍惜眼前人。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>MLXG</cite><span class=quote-date>· 2019-10-20</span></figcaption></figure><figure class=quote><blockquote>希望姐夫可以挣大钱，常带我姐回家。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>Ni</cite><span class=quote-date>· 2019-09-07</span></figcaption></figure><figure class=quote><blockquote>没有神的光环，握紧手中的平凡。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>只要平凡</cite></figcaption></figure><figure class=quote><blockquote>博客名为"不立不破"。不轻谈建立和打破，世界上有太多的问题都是源自于"看的书太少而想的太多"。</blockquote><figcaption><span class=quote-dash>—</span>
<cite><a href=https://github.com/kxxoling/blog rel="noopener nofollow" target=_blank>kxxoling/blog</a></cite></figcaption></figure><figure class=quote><blockquote>在微信"盲约"。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>深圳培训</cite></figcaption></figure><figure class=quote><blockquote>只了解方便面，便做不了满汉全席。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>贝壳面试</cite></figcaption></figure><figure class=quote><blockquote>挤时间，要比想清楚自己的目标，容易太多。</blockquote></figure><figure class=quote><blockquote>成为规则的指定者。</blockquote><figcaption><span class=quote-dash>—</span>
<cite>Cong</cite></figcaption></figure><figure class=quote><blockquote>公司发展可以掩盖很多问题。</blockquote><figcaption><span class=quote-dash>—</span>
